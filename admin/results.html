<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Results - Admin</title>
  <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <h2>Admin Panel</h2>
      <nav>
        <a href="/admin/dashboard.html">Dashboard</a>
        <a href="/admin/subjects.html">Subjects</a>
        <a href="/admin/tests.html">Tests</a>
        <a href="/admin/questions.html">Questions</a>
        <a href="/admin/import.html">Excel Import</a>
        <a href="/admin/results.html" class="active">Results</a>
      </nav>
    </aside>
    <main class="admin-main">
      <h1>Student Results</h1>
      <div style="display:flex;gap:1rem;flex-wrap:wrap;margin:1rem 0;">
        <div class="form-group" style="margin:0;min-width:180px;">
          <label>Filter by Subject</label>
          <select id="subjectFilter" title="Select Subject"><option value="">All</option></select>
        </div>
        <div class="form-group" style="margin:0;min-width:180px;">
          <label>Filter by Test</label>
          <select id="testFilter" title="Select Test"><option value="">All</option></select>
        </div>
      </div>
      <table class="data-table">
        <thead>
          <tr>
            <th>Student</th><th>Mobile</th><th>Subject</th><th>Test</th>
            <th>Score</th><th>%</th><th>Correct</th><th>Wrong</th><th>Submitted</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </main>
  </div>
  <script src="/admin/js/admin-api.js"></script>
  <script src="/admin/js/results.js"></script>
</body>
</html>
