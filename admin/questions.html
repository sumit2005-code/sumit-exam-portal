<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Questions - Admin</title>
  <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <h2>Admin Panel</h2>
      <nav>
        <a href="/admin/dashboard.html">Dashboard</a>
        <a href="/admin/subjects.html">Subjects</a>
        <a href="/admin/tests.html">Tests</a>
        <a href="/admin/questions.html" class="active">Questions</a>
        <a href="/admin/import.html">Excel Import</a>
        <a href="/admin/results.html">Results</a>
      </nav>
    </aside>
    <main class="admin-main">
      <div class="admin-topbar">
        <h1>Questions</h1>
        <button class="btn btn-primary" id="addBtn" disabled>Add Question</button>
      </div>
      <div class="form-group" style="max-width:400px;margin-bottom:1rem;">
        <label>Select Test</label>
        <select id="testSelect" title="Select Test"></select>
      </div>
      <div id="alert"></div>
      <div id="questionsList"></div>
    </main>
  </div>
  <div id="modal" class="modal-overlay hidden">
    <div class="modal">
      <h3 id="modalTitle">Add Question</h3>
      <form id="questionForm">
        <input type="hidden" id="questionId">
        <div class="form-group">
          <label>Question</label>
          <textarea id="questionText" rows="3" title="Enter the question" required></textarea>
        </div>
        <div class="form-group"><label>Option A</label><input type="text" id="optA" title="Enter option A" required></div>
        <div class="form-group"><label>Option B</label><input type="text" id="optB" title="Enter option B" required></div>
        <div class="form-group"><label>Option C</label><input type="text" id="optC" title="Enter option C" required></div>
        <div class="form-group"><label>Option D</label><input type="text" id="optD" title="Enter option D" required></div>
        <div class="form-group">
          <label>Correct Option</label>
          <select id="correctOption" title="Select the correct option" required>
            <option value="A">A</option><option value="B">B</option>
            <option value="C">C</option><option value="D">D</option>
          </select>
        </div>
        <div class="form-group">
          <label>Marks</label>
          <input type="number" id="marks" min="0" value="1" title="Enter the marks for the question" required>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" id="cancelBtn">Cancel</button>
          <button type="submit" class="btn btn-primary">Save</button>
        </div>
      </form>
    </div>
  </div>
  <script src="/admin/js/admin-api.js"></script>
  <script src="/admin/js/questions.js"></script>
</body>
</html>
