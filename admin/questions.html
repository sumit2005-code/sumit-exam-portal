<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Questions — Admin</title>
  <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div class="sidebar-logo">
        <div class="logo-mark">Admin Portal</div>
        <h2>MCQ Platform</h2>
      </div>
      <nav class="sidebar-nav">
        <span class="nav-section">Main</span>
        <a href="/admin/dashboard.html"><span class="nav-icon">◈</span> Dashboard</a>
        <span class="nav-section">Content</span>
        <a href="/admin/subjects.html"><span class="nav-icon">◉</span> Subjects</a>
        <a href="/admin/tests.html"><span class="nav-icon">◎</span> Tests</a>
        <a href="/admin/questions.html" class="active"><span class="nav-icon">◇</span> Questions</a>
        <a href="/admin/import.html"><span class="nav-icon">⊞</span> Excel Import</a>
        <span class="nav-section">Reports</span>
        <a href="/admin/results.html"><span class="nav-icon">◑</span> Results</a>
      </nav>
      <div class="sidebar-footer"><a href="/">← Student Site</a></div>
    </aside>
    <main class="admin-main">
      <div class="admin-topbar">
        <div class="topbar-left">
          <span class="topbar-label">Content</span>
          <h1>Questions</h1>
        </div>
        <button class="btn btn-primary" id="addBtn" disabled>+ Add Question</button>
      </div>
      <div class="admin-body">
        <div class="form-group" style="max-width:360px;margin-bottom:1.5rem;">
          <label>Select Test</label>
          <select id="testSelect"></select>
        </div>
        <div id="alert"></div>
        <div id="questionsList"></div>
      </div>
    </main>
  </div>

  <div id="modal" class="modal-overlay hidden">
    <div class="modal">
      <h3 class="modal-title" id="modalTitle">Add Question</h3>
      <form id="questionForm">
        <input type="hidden" id="questionId">
        <div class="form-group">
          <label>Question Text</label>
          <textarea id="questionText" rows="3" placeholder="Enter the question…" required></textarea>
        </div>
        <div class="form-group"><label>Option A</label><input type="text" id="optA" placeholder="Option A" required></div>
        <div class="form-group"><label>Option B</label><input type="text" id="optB" placeholder="Option B" required></div>
        <div class="form-group"><label>Option C</label><input type="text" id="optC" placeholder="Option C" required></div>
        <div class="form-group"><label>Option D</label><input type="text" id="optD" placeholder="Option D" required></div>
        <div class="form-group">
          <label>Correct Option</label>
          <select id="correctOption" required>
            <option value="A">A</option><option value="B">B</option>
            <option value="C">C</option><option value="D">D</option>
          </select>
        </div>
        <div class="form-group">
          <label>Marks</label>
          <input type="number" id="marks" min="0" value="1" required>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" id="cancelBtn">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Question</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/admin/js/admin-api.js"></script>
  <script src="/admin/js/questions.js"></script>
</body>
</html>
