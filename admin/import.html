<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Excel Import - Admin</title>
  <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <h2>Admin Panel</h2>
      <nav>
        <a href="/admin/dashboard.html">Dashboard</a>
        <a href="/admin/subjects.html">Subjects</a>
        <a href="/admin/tests.html">Tests</a>
        <a href="/admin/questions.html">Questions</a>
        <a href="/admin/import.html" class="active">Excel Import</a>
        <a href="/admin/results.html">Results</a>
      </nav>
    </aside>
    <main class="admin-main">
      <h1>Excel Question Import</h1>
      <p style="color:var(--muted);margin:1rem 0;">
        Upload an Excel file (.xlsx) with columns:
        <strong>subject, test_title, question, option_a, option_b, option_c, option_d, correct_option, marks</strong>
      </p>
      <div id="alert"></div>
      <form id="importForm" class="form-panel" style="max-width:520px;margin:0;">
        <div class="form-group">
          <label>Excel File</label>
          <input type="file" id="file" accept=".xlsx,.xls" placeholder="Choose Excel file" required>
        </div>
        <button type="submit" class="btn btn-primary">Import Questions</button>
      </form>
      <div id="summary" class="import-summary hidden"></div>
    </main>
  </div>
  <script src="/admin/js/admin-api.js"></script>
  <script src="/admin/js/import.js"></script>
</body>
</html>
