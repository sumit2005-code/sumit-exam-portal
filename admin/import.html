<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Excel Import — Admin</title>
  <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div class="sidebar-logo">
        <div class="logo-mark">Admin Portal</div>
        <h2>MCQ Platform</h2>
      </div>
      <nav class="sidebar-nav">
        <span class="nav-section">Main</span>
        <a href="/admin/dashboard.html"><span class="nav-icon">◈</span> Dashboard</a>
        <span class="nav-section">Content</span>
        <a href="/admin/subjects.html"><span class="nav-icon">◉</span> Subjects</a>
        <a href="/admin/tests.html"><span class="nav-icon">◎</span> Tests</a>
        <a href="/admin/questions.html"><span class="nav-icon">◇</span> Questions</a>
        <a href="/admin/import.html" class="active"><span class="nav-icon">⊞</span> Excel Import</a>
        <span class="nav-section">Reports</span>
        <a href="/admin/results.html"><span class="nav-icon">◑</span> Results</a>
      </nav>
      <div class="sidebar-footer"><a href="/">← Student Site</a></div>
    </aside>
    <main class="admin-main">
      <div class="admin-topbar">
        <div class="topbar-left">
          <span class="topbar-label">Bulk Upload</span>
          <h1>Excel Import</h1>
        </div>
      </div>
      <div class="admin-body">
        <div style="max-width:560px;">
          <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius2);padding:1.25rem;margin-bottom:1.5rem;">
            <p style="font-family:var(--mono);font-size:0.75rem;color:var(--text3);margin-bottom:0.6rem;letter-spacing:0.05em;">REQUIRED COLUMNS</p>
            <p style="font-family:var(--mono);font-size:0.78rem;color:var(--accent);word-break:break-all;line-height:1.7;">
              subject · test_title · question · option_a · option_b · option_c · option_d · correct_option · marks
            </p>
          </div>

          <div id="alert"></div>

          <form id="importForm" style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius2);padding:1.5rem;">
            <div class="form-group">
              <label>Excel File (.xlsx)</label>
              <input type="file" id="file" accept=".xlsx,.xls" required>
            </div>
            <button type="submit" class="btn btn-primary">Import Questions →</button>
          </form>

          <div id="summary" class="import-summary hidden"></div>
        </div>
      </div>
    </main>
  </div>
  <script src="/admin/js/admin-api.js"></script>
  <script src="/admin/js/import.js"></script>
</body>
</html>
