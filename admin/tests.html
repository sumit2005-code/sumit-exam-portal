<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tests - Admin</title>
  <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <h2>Admin Panel</h2>
      <nav>
        <a href="/admin/dashboard.html">Dashboard</a>
        <a href="/admin/subjects.html">Subjects</a>
        <a href="/admin/tests.html" class="active">Tests</a>
        <a href="/admin/questions.html">Questions</a>
        <a href="/admin/import.html">Excel Import</a>
        <a href="/admin/results.html">Results</a>
      </nav>
    </aside>
    <main class="admin-main">
      <div class="admin-topbar">
        <h1>Tests</h1>
        <button class="btn btn-primary" id="addBtn">Add Test</button>
      </div>
      <div id="alert"></div>
      <table class="data-table">
        <thead>
          <tr><th>Title</th><th>Subject</th><th>Duration</th><th>Questions</th><th>Status</th><th>Actions</th></tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </main>
  </div>
  <div id="modal" class="modal-overlay hidden">
    <div class="modal">
      <h3 id="modalTitle">Add Test</h3>
      <form id="testForm">
        <input type="hidden" id="testId">
        <div class="form-group">
          <label>Subject</label>
          <select id="subjectId" title="Select Subject" required></select>
        </div>
        <div class="form-group">
          <label>Title</label>
          <input type="text" id="title" title="Enter the test title" required>
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea id="description" rows="2" title="Enter the test description"></textarea>
        </div>
        <div class="form-group">
          <label>Duration (minutes)</label>
          <input type="number" id="durationMinutes" min="1" value="30" title="Enter the test duration in minutes" required>
        </div>
        <div class="form-group">
          <label><input type="checkbox" id="isActive" checked> Active</label>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" id="cancelBtn">Cancel</button>
          <button type="submit" class="btn btn-primary">Save</button>
        </div>
      </form>
    </div>
  </div>
  <script src="/admin/js/admin-api.js"></script>
  <script src="/admin/js/tests.js"></script>
</body>
</html>
