<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Admin</title>
  <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <h2>Admin Panel</h2>
      <nav>
        <a href="/admin/dashboard.html" class="active">Dashboard</a>
        <a href="/admin/subjects.html">Subjects</a>
        <a href="/admin/tests.html">Tests</a>
        <a href="/admin/questions.html">Questions</a>
        <a href="/admin/import.html">Excel Import</a>
        <a href="/admin/results.html">Results</a>
        <a href="/">Student Site</a>
      </nav>
    </aside>
    <main class="admin-main">
      <div class="admin-topbar">
        <h1>Dashboard</h1>
        <div>
          <span id="adminUser"></span>
          <button class="btn btn-secondary btn-sm" id="logoutBtn">Logout</button>
        </div>
      </div>
      <div id="statsGrid" class="stats-grid"></div>
      <h2 style="margin-bottom:0.75rem;">Test-wise Performance</h2>
      <div style="overflow-x:auto;margin-bottom:2rem;">
        <table class="data-table" id="testStatsTable">
          <thead>
            <tr>
              <th>Test</th>
              <th>Attempts</th>
              <th>Avg Score</th>
              <th>Avg %</th>
              <th>Highest</th>
              <th>Lowest</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
      <h2 style="margin-bottom:0.75rem;">Recent Attempts</h2>
      <div style="overflow-x:auto;">
        <table class="data-table" id="recentTable">
          <thead>
            <tr>
              <th>Student</th>
              <th>Mobile</th>
              <th>Subject</th>
              <th>Test</th>
              <th>Score</th>
              <th>%</th>
              <th>Submitted</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </main>
  </div>
  <script src="/admin/js/admin-api.js"></script>
  <script src="/admin/js/dashboard.js"></script>
</body>
</html>
