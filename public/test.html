<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Take Test — MCQ Platform</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .exam-header {
      padding: 0.75rem 1.5rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .exam-header .exam-title {
      font-family: var(--serif);
      font-size: 1rem;
      color: var(--text);
    }
    .submit-area {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 1.5rem;
      margin-top: 1rem;
      display: flex;
      gap: 1rem;
      justify-content: center;
    }
  </style>
</head>
<body>
  <div id="timerBar" class="timer-bar hidden">
    <div style="display:flex;align-items:center;gap:0.75rem;">
      <span style="font-size:0.75rem;color:var(--text3);">TIME REMAINING</span>
      <span id="timerDisplay">--:--</span>
    </div>
    <button class="btn btn-secondary btn-sm" id="submitBtn">Submit Test</button>
  </div>

  <main>
    <div class="container" style="max-width:720px;">
      <div id="alert"></div>

      <section id="startSection">
        <div style="padding:3rem 0 1.5rem;">
          <span style="font-family:var(--mono);font-size:0.7rem;color:var(--accent);letter-spacing:0.2em;text-transform:uppercase;">Ready to begin?</span>
          <h2 id="testTitle" style="font-family:var(--serif);font-size:2rem;margin:0.4rem 0;font-weight:400;">Loading…</h2>
          <p id="testMeta" style="color:var(--text2);font-family:var(--mono);font-size:0.8rem;"></p>
        </div>
        <div class="form-panel" style="margin:0;">
          <div class="form-group">
            <label>Your Full Name</label>
            <form id="startForm">
              <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="studentName" placeholder="Enter your name" required>
              </div>
              <div class="form-group">
                <label>Mobile Number</label>
                <input type="tel" id="studentMobile" placeholder="+91 XXXXX XXXXX" required pattern="[0-9+\-\s]{8,15}">
              </div>
              <button type="submit" class="btn btn-primary btn-block" style="margin-top:0.5rem;">Start Test →</button>
            </form>
          </div>
        </div>
        <p style="margin-top:1.25rem;font-family:var(--mono);font-size:0.78rem;color:var(--text3);">
          <a href="/tests.html" style="color:var(--text3);text-decoration:none;" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--text3)'">← back to tests</a>
        </p>
      </section>

      <section id="examSection" class="hidden">
        <div id="questionsContainer" style="padding:1.5rem 0;"></div>
        <div class="submit-area">
          <button class="btn btn-primary" id="submitBtnBottom" style="min-width:200px;">Submit Test →</button>
        </div>
      </section>
    </div>
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/test-runner.js"></script>
</body>
</html>
